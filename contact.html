<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="contact-style.css">
</head>

<body>
    <header>
        <h1>Contact</h1>
    </header>

    <button class="back-btn"><a href="index.html">Back To Home</a></button>

    <main>
        <section>
            <form action="">
                <div>
                    <label for="1">Name:-</label>
                </div>
                <div>
                    <input type="text" id="1" placeholder="Enter Name">
                </div>

                <div>
                    <label for="2">Mobile No:-</label>
                </div>
                <div><input type="num" id="2" placeholder="Enter Mobile No"></div>
                <div>
                    <label for="3"> E-mail:-</label>
                </div>
                <div>
                    <input type="email" id="3" placeholder="Enter Your E-mail">
                </div>

                <div> <textarea name="message" rows="5" placeholder="Enter your message"></textarea></div>
            </form>
        </section>
    </main>
</body>

</html>
